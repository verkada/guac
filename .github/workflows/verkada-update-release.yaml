name: Update Real Remote to Fork

on:
  push:
    branches:
      - natsumi.pang/VSYS-13430_update_guac_automatically
  workflow_dispatch:
    inputs:
      test_branch:
        description: 'Optional: Branch to test with (leave empty to use main)'
        required: false
        type: string
  schedule:
    # run every night @ 01:00 am UTC
    - cron: '1 0 * * *'

jobs:
  fetch-updates:
    runs-on: ubuntu-latest
    environment: upstream-link
    outputs:
      outcomes: ${{ steps.outputs.outputs.results }}

    steps:
      - name: Set branch name
        id: set-branch
        run: |
          if [ -n "${{ github.event.inputs.test_branch }}" ]; then
            echo "branch_name=${{ github.event.inputs.test_branch }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ]; then
            echo "branch_name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          else
            echo "branch_name=main" >> $GITHUB_OUTPUT
          fi

      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.set-branch.outputs.branch_name }}
          submodules: recursive
          fetch-depth: 0

      - name: Set job start time
        run: echo "JOB_START_TIME=$(date -u +%s)" >> $GITHUB_ENV

      - name: Update
        run: |
          BRANCH_NAME="${{ steps.set-branch.outputs.branch_name }}"
          git fetch -p origin
          git checkout $BRANCH_NAME
          
          # Note: upstream needs to point to the origin repo
          git remote add upstream "${{ vars.UPSTREAM_URL }}"
          git fetch -p upstream

          if git diff --quiet origin/$BRANCH_NAME..upstream/$BRANCH_NAME; then
            echo "No changes detected"
            exit 0
          fi

          git rebase upstream/$BRANCH_NAME

      - name: Push Updates
        id: push-branch
        run: |
          BRANCH_NAME="${{ steps.set-branch.outputs.branch_name }}"
          git config --global user.email "device-platform-github-bot@noreply.verkada.com"
          git config --global user.name "Device Platform GitHub Bot"

          git push

      - name: Post job success status to slack
        if: ${{ success() }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          # device-platform-newsfeed
          channel-id: 'GQ968L7RC'
          # For posting a simple plain text message
          slack-message: |
            ${{ github.repository }}: ${{ github.workflow }}: ${{ job.status }}
            Branch: ${{ steps.set-branch.outputs.branch_name }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Post job failure status to slack
        if: ${{ ! success() }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          # device-platform-alerts
          channel-id: 'C083RN0EPEE'
          # For posting a simple plain text message
          slack-message: |
            ${{ github.repository }}: ${{ github.workflow }}: *${{ job.status }}*
            Branch: ${{ steps.set-branch.outputs.branch_name }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            <@UCUGH2DGQ> <@U025XPBNJR5> <@U07KST2PE23> <@U024C1144BE> <@U083E9XKYDN>
          # dennis, nick, chris, sam, natsumi
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

